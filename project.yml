name: macOSAgentTooling
options:
  bundleIdPrefix: com.cheng-agent
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: "-"
    PRODUCT_NAME: "macOS Agent Tooling"

targets:
  macOSAgentTooling:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - "**/.DS_Store"
      - path: Resources
        type: folder
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.cheng-agent.macosagenttooling
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
    info:
      path: App/Info.plist
      properties:
        CFBundleName: "macOS Agent Tooling"
        CFBundleDisplayName: "macOS Agent Tooling"
        CFBundleIdentifier: com.cheng-agent.macosagenttooling
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: macOSAgentTooling
        LSMinimumSystemVersion: "14.0"
        LSApplicationCategoryType: "public.app-category.developer-tools"
        NSHumanReadableCopyright: "Copyright © 2026. All rights reserved."
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true

packages: {}
